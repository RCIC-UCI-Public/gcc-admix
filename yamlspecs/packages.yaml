# System RPMS required to build this admix
site: !include site.yaml
system_pre10:
   - glibc-devel.i686
   - libgcc.i686
   - libstdc++-devel.i686
   - ncurses-devel.i686
system:
   - !eval "'{{system_pre10}}' if int({{site.os_release}}) < 10 else ''"
   - bison
   - flex
   - gmp-devel
   - libmpc-devel
   - !ifeq "{{site.os_release}},7,libmpfr-devel,mpfr-devel"
   - texinfo
   - binutils-devel
   - gcc-c++
   - !eval "'gcc-gdb-plugin' if int({{site.os_release}}) < 9 else ''"
   - libstdc++-devel
   - rpm-devel
bootstrap0:
   - binutils-bootstrap
bootstrap1:
   - gcc
   - gcc-module
   - binutils
   - mpfr
build0:
   - gmp
   - libiconv
   - mpc
   - "{{build_set_specific}}"
bootstrap:
build:
build_set_specific:
manifest:
sets:
   - gcc6
   - gcc8
   - gcc11
   - gcc15
